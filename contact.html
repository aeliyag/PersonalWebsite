<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/style.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | Aeliya Grover</title>
</head>
<body>
  <script src="/assets/js/global.js"></script>
  <div id="navbar"></div>

  <main>
    <h1>Contact</h1>
    <section class="card">
      <p>
        <a href="mailto:Aeliyag@uchicago.edu">Aeliyag@uchicago.edu</a>
      </p>
      <p>
        <a href="https://www.linkedin.com/in/aeliya-grover-50307b201/" target="_blank" rel="noopener">LinkedIn</a>
        ·
        <a href="https://github.com/aeliyag" target="_blank" rel="noopener">GitHub</a>
        ·
        <a href="/assets/docs/aeliya-grover-resume.pdf" target="_blank" rel="noopener">Resume (PDF)</a>
      </p>
    </section>

    <div id="contact_me">
      <section class="card">
        <h2>Newsletter</h2>
        <p>Occasional updates on projects and events.</p>
        <form id="email-form">
          <input type="email" id="email" placeholder="Email" required autocomplete="email" />
          <button type="submit">Subscribe</button>
        </form>
        <p id="status"></p>
      </section>
    </div>
  </main>

  <div id="footer"></div>

  <script>
    fetch('/nav.html')
      .then((res) => res.text())
      .then((data) => {
        document.getElementById('navbar').innerHTML = data;
      });
    fetch('/footer.html')
      .then((res) => res.text())
      .then((data) => {
        document.getElementById('footer').innerHTML = data;
      });
  </script>
  <script type="module" src="/assets/js/firebaseConfig.js"></script>
  <script type="module" src="/assets/js/emailList.js"></script>
</body>
</html>
